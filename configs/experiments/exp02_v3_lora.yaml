experiment:
  name: exp02_v3_lora
  description: "Fine-tuning Mistral-7B-Instruct using dataset_v3 only."
  active_dataset: dataset_v3

dataset:
  raw_path: data/raw/dataset_v3.json
  train_path: data/experiments/exp02_v3_lora/train.json
  val_path: data/experiments/exp02_v3_lora/val.json
  test_path: data/experiments/exp02_v3_lora/test.json
  split_by: paper
  entries_per_paper: 5
  split_seed: 42
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

model:
  base_model: unsloth/mistral-7b-instruct-v0.2-bnb-4bit
  baseline_model: mistralai/Mistral-7B-Instruct-v0.2
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  epochs: 15
  train_batch_size: 8
  eval_batch_size: 8
  learning_rate: 0.0001
  warmup_steps: 50
  lr_scheduler_type: cosine
  early_stopping_patience: 5
  fp16: false
  bf16: true
  report_to: none

inference:
  max_new_tokens: 150
  do_sample: false

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - mae
    - rmse
    - qwk
    - cohen_kappa_linear

outputs:
  experiment_dir: results/experiments/exp02_v3_lora
  model_dir: models/experiments/exp02_v3_lora
  baseline_predictions: results/experiments/exp02_v3_lora/baseline_predictions.json
  baseline_metrics: results/experiments/exp02_v3_lora/baseline_metrics.json
  finetuned_predictions: results/experiments/exp02_v3_lora/finetuned_predictions.json
  finetuned_metrics: results/experiments/exp02_v3_lora/finetuned_metrics.json
  config_used: results/experiments/exp02_v3_lora/config_used.yaml
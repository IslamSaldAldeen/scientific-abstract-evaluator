experiment:
  name: exp03_dataset_final_cot
  description: "Fine-tuning on dataset_final (495 entries) with CoT prompt and overfitting fix."
  active_dataset: dataset_final

dataset:
  raw_path: data/raw/dataset_final.json
  train_path: data/experiments/exp03_dataset_final_cot/train.json
  val_path: data/experiments/exp03_dataset_final_cot/val.json
  test_path: data/experiments/exp03_dataset_final_cot/test.json
  split_by: paper
  entries_per_paper: 5
  split_seed: 42
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

model:
  base_model: unsloth/mistral-7b-instruct-v0.2-bnb-4bit
  baseline_model: mistralai/Mistral-7B-Instruct-v0.2
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  epochs: 5
  train_batch_size: 8
  eval_batch_size: 8
  learning_rate: 0.00005
  warmup_steps: 50
  lr_scheduler_type: cosine
  early_stopping_patience: 2
  fp16: false
  bf16: true
  report_to: none

inference:
  max_new_tokens: 200
  do_sample: false

evaluation:
  metrics:
    - accuracy
    - macro_f1
    - mae
    - rmse
    - qwk
    - cohen_kappa_linear

outputs:
  experiment_dir: results/experiments/exp03_dataset_final_cot
  model_dir: models/experiments/exp03_dataset_final_cot
  baseline_predictions: results/experiments/exp03_dataset_final_cot/baseline_predictions.json
  baseline_metrics: results/experiments/exp03_dataset_final_cot/baseline_metrics.json
  finetuned_predictions: results/experiments/exp03_dataset_final_cot/finetuned_predictions.json
  finetuned_metrics: results/experiments/exp03_dataset_final_cot/finetuned_metrics.json
  config_used: results/experiments/exp03_dataset_final_cot/config_used.yaml
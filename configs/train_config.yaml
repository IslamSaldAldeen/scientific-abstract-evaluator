base_model: mistralai/Mistral-7B-Instruct-v0.2
dataset:
  train_path: data/splits/train.json
  val_path: data/splits/val.json
  test_path: data/splits/test.json

training:
  method: lora
  max_seq_length: 4096
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002

output:
  model_dir: models/
  results_dir: results/

